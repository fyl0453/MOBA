name: Unity Build

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-android:
    name: Build Android APK
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Unity
        uses: buildalon/unity-setup@v1
        with:
          unityVersion: 2022.3.0f1

      - name: Build Android
        uses: buildalon/unity-builder@v1
        with:
          targetPlatform: Android
          projectPath: HeroesOfWar

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: android-apk
          path: build/Android/*.apk
