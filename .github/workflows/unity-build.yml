name: Unity Build

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-android:
    name: Build Android APK
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Unity
        uses: unity-game-ci/unity-setup@v2
        with:
          unityVersion: 2022.3.0f1

      - name: Activate Unity License
        uses: unity-game-ci/unity-activate@v2
        with:
          username: ${{ secrets.UNITY_USERNAME }}
          password: ${{ secrets.UNITY_PASSWORD }}

      - name: Build Android
        uses: unity-game-ci/unity-builder@v2
        with:
          targetPlatform: Android
          projectPath: HeroesOfWar

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: android-apk
          path: build/Android/*.apk
