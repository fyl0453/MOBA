workflows:
  unity-android-build:
    name: Unity Android Build
    max_build_duration: 120
    instance_type: mac_pro
    environment:
      vars:
        UNITY_VERSION: "2022.3.0f1"
        UNITY_LICENSE: Encrypted(YOUR_ENCRYPTED_LICENSE)
        UNITY_PROJECT_PATH: "HeroesOfWar"
    scripts:
      - name: List files
        script: |
          ls -la
      - name: Activate Unity License
        script: |
          unity-editor \
            -quit \
            -batchmode \
            -serial "$UNITY_LICENSE" \
            -logFile /dev/stdout
        working_directory: $UNITY_PROJECT_PATH
      - name: Build Android APK
        script: |
          unity-editor \
            -quit \
            -batchmode \
            -projectPath . \
            -executeMethod BuildScript.BuildAndroid \
            -logFile /dev/stdout
        working_directory: $UNITY_PROJECT_PATH
    artifacts:
      - HeroesOfWar/build/android/*.apk
      - HeroesOfWar/build/android/*.aab
