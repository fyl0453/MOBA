    scripts:
      - name: Activate Unity License
        script: |
          unity-editor \
            -quit \
            -batchmode \
            -serial $UNITY_LICENSE \
            -logFile /dev/stdout
      - name: Build macOS App
        script: |
          unity-editor \
            -quit \
            -batchmode \
            -projectPath . \
            -executeMethod BuildScript.BuildMacOS \
            -logFile /dev/stdout
    artifacts:
      - build/macos/*.app

  unity-webgl-build:
    name: Unity WebGL Build
    max_build_duration: 120
    instance_type: mac_pro
    environment:
      vars:
