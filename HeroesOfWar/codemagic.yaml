    scripts:
      - name: Activate Unity License
        script: |
          unity-editor \
            -quit \
            -batchmode \
            -serial $UNITY_LICENSE \
            -logFile stdout.log
      - name: Build Windows EXE
        script: |
          unity-editor \
            -quit \
            -batchmode \
            -projectPath . \
            -executeMethod BuildScript.BuildWindows \
            -logFile stdout.log
    artifacts:
      - build/windows/*.exe

  unity-macos-build:
    name: Unity macOS Build
    max_build_duration: 120
    instance_type: mac_pro
    environment:
      vars:
        UNITY_VERSION: "2022.3.0f1"
